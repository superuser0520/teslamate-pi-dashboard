<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <title>Login - SooLew Dashboard</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="login-page" data-theme="dark">
    <main class="login-shell">
      <section class="login-card">
        <div class="brand login-brand">
          <span class="brand-mark">S</span>
          <span>SooLew</span>
        </div>
        <p class="eyebrow">Private dashboard</p>
        <h1>Sign in</h1>
        <p class="hero-copy">Use your dashboard account to view your TeslaMate data.</p>
        <p class="login-error" id="loginError" hidden>Username or password is incorrect.</p>
        <form class="login-form" action="/login" method="post">
          <label>
            <span>Email</span>
            <input name="username" type="email" value="soolihjing@icloud.com" autocomplete="username" required>
          </label>
          <label>
            <span>Password</span>
            <input name="password" type="password" autocomplete="current-password" required autofocus>
          </label>
          <label class="remember-row">
            <input name="remember" type="checkbox">
            <span>Keep me signed in on this device</span>
          </label>
          <button type="submit">Login</button>
        </form>
      </section>
    </main>
    <script>
      document.querySelector("#loginError").hidden = !new URLSearchParams(window.location.search).has("error");
    </script>
  </body>
</html>
